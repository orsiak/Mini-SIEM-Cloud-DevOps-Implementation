<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <title>Login page</title>
    </head>

    <body>
        <form action="/login" method="post">
            <label>Log in</label>
            <input type="text" name="username" placeholder="Enter your username" class="input-field">
            <input type="text" name="password" placeholder="Enter your password" class="input-field">
            <input type="submit" value="Login"/>
        </form>
    </body>

</html>
